<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>スーパーTANABEブラザーズ 〜バルーンファイト〜</title>
<style>
  html,body{height:100%;margin:0;background:#7ec0ff;display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,Segoe UI,Roboto,'Hiragino Kaku Gothic ProN',Meiryo,sans-serif}
  #container{width:90vmin;max-width:720px;aspect-ratio:256/240;position:relative}
  canvas{width:100%;height:100%;image-rendering:pixelated;background:linear-gradient(#87CEEB,#bfefff);display:block;border:6px solid #222;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
  #overlay{position:absolute;left:0;top:0;right:0;bottom:0;pointer-events:none}
  .hud{position:absolute;color:#fff;text-shadow:0 1px 0 #000, 0 -1px 0 rgba(0,0,0,0.3);font-weight:700;letter-spacing:1px}
  #title{left:8px;top:8px;font-size:12px}
  #scores{right:8px;top:8px;text-align:right;font-size:12px}
  #instructions{left:8px;bottom:8px;font-size:11px}
  button{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);padding:12px 20px;font-size:18px;border-radius:8px;border:none;background:#ffde59;color:#111;cursor:pointer;box-shadow:0 4px #b38600}
  @media (hover:none){button{font-size:16px}}
  /* tiny mobile hint */
  #touchHint{position:absolute;left:50%;bottom:8px;transform:translateX(-50%);color:#fff;font-size:12px}
</style>
</head>
<body>
<div id="container">
  <canvas id="game" width="256" height="240"></canvas>
  <div id="overlay">
    <div id="title" class="hud">スーパーTANABEブラザーズ 〜バルーンファイト〜</div>
    <div id="scores" class="hud"></div>
    <div id="instructions" class="hud" style="left:8px;bottom:8px">1P: WASD (W=flap). 2P: ↑←→. Touch: left=P1, right=P2</div>
    <div id="touchHint"></div>
  </div>
</div>

<script>
/*
スーパーTANABEブラザーズ 〜バルーンファイト〜
Single HTML file game inspired by Balloon Fight (1984)
Features:
- Two playable characters with pixel-face details (Takeshi and Kenji)
- 3 AI balloon enemies
- Platforms (clouds), side lightning hazards, balloons, physics, AI
- WebAudio 8-bit BGM & SFX
- Keyboard + touch controls
- Title screen, win/gameover, retry

Author: Fun AI implementation
*/

(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const overlayScores = document.getElementById('scores');
  const touchHint = document.getElementById('touchHint');
  // Pixel scale for drawing pixel-art sprites
  const PS = 2; // pixel size multiplier for internal sprite drawing

  // Audio setup
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  const audioCtx = new AudioContextClass();
  let bgmOsc = null;
  let bgmGain = null;
  let bgmTimer = null;

  function startBGM() {
    if (!audioCtx) return;
    stopBGM();
    audioCtx.resume();
    bgmGain = audioCtx.createGain();
    bgmGain.gain.value = 0.12;
    bgmGain.connect(audioCtx.destination);

    // simple square wave melody sequence
    const tempo = 120;
    const beat = 60 / tempo;
    const notes = [
      // [freq, duration in beats]
      [880, 1/2],[988,1/2],[1047,1],[0,1/4],[880,1/2],[988,1/2],[1175,1],[0,1],
      [784,1/2],[880,1/2],[988,1],[0,1/4],[784,1/2],[880,1/2],[1047,1],[0,1]
    ];
    let t = audioCtx.currentTime + 0.05;
    // schedule once then loop by setInterval simple
    function scheduleOnce() {
      t = audioCtx.currentTime + 0.05;
      for (let i=0;i<notes.length;i++){
        const [freq, dur] = notes[i];
        if (freq>0){
          const osc = audioCtx.createOscillator();
          osc.type = 'square';
          osc.frequency.value = freq;
          const g = audioCtx.createGain();
          g.gain.value = 0.18;
          g.gain.setValueAtTime(0.18, t);
          g.gain.exponentialRampToValueAtTime(0.0001, t + dur * beat * 0.95);
          osc.connect(g); g.connect(bgmGain);
          osc.start(t); osc.stop(t + dur * beat);
        }
        t += dur * beat;
      }
    }
    scheduleOnce();
    bgmTimer = setInterval(scheduleOnce, (notes.reduce((a,b)=>a+b[1],0) * beat) * 1000);
  }
  function stopBGM(){
    if (bgmTimer) { clearInterval(bgmTimer); bgmTimer = null; }
    bgmGain = null;
  }

  // Sound effects (simple)
  function sfxPop() {
    const ctxA = audioCtx;
    if(!ctxA) return;
    const o = ctxA.createOscillator();
    const g = ctxA.createGain();
    o.type = 'square';
    o.frequency.value = 1200;
    g.gain.value = 0.0001;
    o.connect(g); g.connect(ctxA.destination);
    const t = ctxA.currentTime;
    g.gain.setValueAtTime(0.001, t);
    g.gain.exponentialRampToValueAtTime(0.00001, t+0.25);
    o.start(t); o.stop(t+0.25);

    // noise
    const bufferSize = ctxA.sampleRate * 0.08;
    const buffer = ctxA.createBuffer(1, bufferSize, ctxA.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i=0;i<bufferSize;i++) data[i] = (Math.random()*2-1)*Math.exp(-i/bufferSize*6);
    const noise = ctxA.createBufferSource();
    const ng = ctxA.createGain();
    noise.buffer = buffer; ng.gain.value = 0.3;
    noise.connect(ng); ng.connect(ctxA.destination);
    noise.start(t); noise.stop(t+0.08);
  }
  function sfxJump() {
    const ctxA = audioCtx;
    if(!ctxA) return;
    const o = ctxA.createOscillator();
    const g = ctxA.createGain();
    o.type = 'sine';
    o.frequency.value = 600;
    g.gain.value = 0.1;
    o.connect(g); g.connect(ctxA.destination);
    const t = ctxA.currentTime;
    g.gain.setValueAtTime(0.1,t);
    g.gain.exponentialRampToValueAtTime(0.00001,t+0.18);
    o.frequency.setValueAtTime(600,t);
    o.frequency.exponentialRampToValueAtTime(100,t+0.18);
    o.start(t); o.stop(t+0.18);
  }
  function sfxFall() {
    const ctxA = audioCtx;
    if(!ctxA) return;
    const o = ctxA.createOscillator();
    const g = ctxA.createGain();
    o.type = 'sawtooth';
    o.frequency.value = 220;
    g.gain.value = 0.08;
    o.connect(g); g.connect(ctxA.destination);
    const t = ctxA.currentTime;
    g.gain.setValueAtTime(0.08,t);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.6);
    o.frequency.exponentialRampToValueAtTime(80,t+0.6);
    o.start(t); o.stop(t+0.6);
  }
  function sfxWin() {
    const ctxA = audioCtx;
    if(!ctxA) return;
    const now = ctxA.currentTime;
    const freqs=[880,1047,1319];
    freqs.forEach((f,i)=>{
      const o = ctxA.createOscillator();
      const g = ctxA.createGain();
      o.type='square'; o.frequency.value=f;
      g.gain.value=0.08;
      o.connect(g); g.connect(ctxA.destination);
      o.start(now + i*0.15); o.stop(now + i*0.15 + 0.28);
      g.gain.setValueAtTime(0.08, now + i*0.15);
      g.gain.exponentialRampToValueAtTime(0.0001, now + i*0.15 + 0.28);
    });
  }

  // Game states
  let state = 'title'; // title, play, win, gameover
  let entities = []; // all actors: players + enemies
  let players = []; // references to player entities (2)
  let platforms = [];
  let hazards = {left:false,right:false, timer:0};
  let lastTimestamp = 0;
  let gravity = 0.25;
  let wind = 0;
  let keys = {};
  let touchMap = {}; // pointerId -> 'p1' or 'p2'
  let mobileControlsActive = false;
  let score = {p1:0,p2:0};

  // Create world platforms (clouds)
  function setupPlatforms() {
    platforms = [];
    platforms.push({x:16,y:200,w:80,h:12}); // lower left
    platforms.push({x:160,y:190,w:84,h:12}); // lower right
    platforms.push({x:48,y:120,w:72,h:12}); // mid left
    platforms.push({x:140,y:80,w:80,h:12}); // high right
    // make two or three visible clouds (we'll draw them)
  }

  // Entity factory
  function makePlayer(id, name, x, y, controls, portrait) {
    return {
      type: 'player',
      id,
      name,
      x, y,
      prevX: x, prevY: y,
      vx: 0, vy: 0,
      ax: 0,
      radius: 10,
      color: '#fff',
      balloons: 2,
      invuln: 0,
      onPlatform: false,
      facing: 1,
      score: 0,
      controls,
      portrait, // 'takeshi' or 'kenji'
      isHuman: true,
      aiTimer: 0
    };
  }

  function makeEnemy(id, x, y, colorA, colorB) {
    return {
      type: 'enemy',
      id,
      name: 'ENEMY',
      x,y,
      prevX:x,prevY:y,
      vx: (Math.random()>0.5?1:-1)*0.6,
      vy: 0,
      ax:0,
      radius: 9,
      color: '#f88',
      balloons: 2,
      invuln: 0,
      onPlatform: false,
      facing: 1,
      isHuman:false,
      aiTimer: Math.random()*2
    };
  }

  function resetGame() {
    entities = [];
    players = [];
    setupPlatforms();
    hazards = {left:false,right:false,timer:0};

    // Create players with portraits and starting positions
    const p1 = makePlayer(1, 'TAKESHI', 80, 160, {left:'a',right:'d',flap:'w'}, 'takeshi');
    const p2 = makePlayer(2, 'KENJI', 176, 160, {left:'ArrowLeft',right:'ArrowRight',flap:'ArrowUp'}, 'kenji');

    players.push(p1,p2);
    entities.push(p1,p2);

    // Create 3 enemies
    const ecount = 3 + Math.floor(Math.random()*2);
    for(let i=0;i<ecount;i++){
      const ex = 40 + i*60;
      const ey = 40 + Math.random()*80;
      entities.push(makeEnemy(100+i, ex, ey, '#6cf', '#fff'));
    }

    score = {p1:0,p2:0};
    lastTimestamp = 0;
    state = 'play';
    startBGM();
  }

  // Input handling
  window.addEventListener('keydown', (e) => {
    keys[e.key] = true;
    if (state === 'title' && e.key === 'Enter') {
      resetGame();
    } else if ((state === 'win' || state === 'gameover') && e.key === 'Enter') {
      state = 'title';
    }
  });
  window.addEventListener('keyup', (e) => {
    keys[e.key] = false;
  });

  // Touch controls: left half => P1 flap, right half => P2 flap
  canvas.addEventListener('touchstart', (ev) => {
    mobileControlsActive = true;
    touchHint.textContent = 'Touch mode: tap left for 1P, right for 2P';
    ev.preventDefault();
    for (let t of ev.changedTouches) {
      const rect = canvas.getBoundingClientRect();
      const x = (t.clientX - rect.left) * (canvas.width / rect.width);
      if (x < canvas.width/2) {
        touchMap[t.identifier] = 'p1';
        handleFlap(players[0]);
      } else {
        touchMap[t.identifier] = 'p2';
        handleFlap(players[1]);
      }
    }
  }, {passive:false});

  canvas.addEventListener('touchend', (ev) => {
    ev.preventDefault();
    for (let t of ev.changedTouches) {
      delete touchMap[t.identifier];
    }
  }, {passive:false});

  canvas.addEventListener('mousedown', (ev) => {
    // Click: start from title or flap both? On title, start. During play: flap nearest side
    const rect = canvas.getBoundingClientRect();
    const x = (ev.clientX - rect.left) * (canvas.width / rect.width);
    if (state === 'title') {
      resetGame();
      return;
    }
    if (state === 'win' || state === 'gameover') {
      state = 'title';
      stopBGM();
      return;
    }
    if (x < canvas.width/2) handleFlap(players[0]); else handleFlap(players[1]);
  });

  function handleFlap(ent) {
    if (!ent || ent.balloons<=0) return;
    // apply flap impulse
    ent.vy = -4.4;
    sfxJump();
    ent.onPlatform = false;
  }

  // Physics and update
  function update(dt) {
    if (state !== 'play') return;

    // hazards timer
    hazards.timer += dt;
    if (hazards.timer > 2000) {
      hazards.timer = 0;
      hazards.left = Math.random() < 0.5;
      hazards.right = Math.random() < 0.6;
      // hazards active for a short time
      setTimeout(()=>{hazards.left=false;hazards.right=false}, 700);
    }

    // AI and inputs
    for (let ent of entities) {
      ent.prevX = ent.x; ent.prevY = ent.y;
      // reduce invulnerability
      if (ent.invuln > 0) ent.invuln = Math.max(0, ent.invuln - dt/16);
      // input for players
      if (ent.type === 'player') {
        // Horizontal movement
        let move = 0;
        if (ent.controls) {
          if (keys[ent.controls.left]) move -= 1;
          if (keys[ent.controls.right]) move += 1;
        }
        // Touch continuous movement not implemented; only flap via touch
        // Apply acceleration
        ent.vx += move * 0.14;
        ent.vx *= 0.92;

        // Flap (key)
        if (keys[ent.controls.flap]) {
          if (ent.balloons>0 && ent.vy > -5) {
            ent.vy = ent.vy - 0.8 - Math.random()*0.2;
            ent.onPlatform = false;
            sfxJump();
          }
        }

      } else if (ent.type === 'enemy') {
        // simple AI: travel horizontally, flap occasionally to stay afloat, try to target nearest player
        ent.aiTimer -= dt/1000;
        if (ent.aiTimer <= 0) {
          ent.aiTimer = 0.6 + Math.random()*1.2;
          // decide to flap sometimes, or change direction
          if (Math.random() < 0.6) {
            if (ent.balloons>0) ent.vy = -3 - Math.random()*1.5;
          }
          if (Math.random() < 0.5) ent.vx *= -1;
          // gently home towards nearest player if below or above
          let target = players[Math.floor(Math.random()*players.length)];
          if (target && target.balloons>0) {
            if (target.x < ent.x) ent.vx = -0.6 - Math.random()*0.6;
            else ent.vx = 0.6 + Math.random()*0.6;
            if (target.y < ent.y && Math.random()<0.6) ent.vy = -3 - Math.random()*1;
          }
        }
        // apply friction
        ent.vx *= 0.995;
      }

      // gravity: if balloons==0 sink faster
      const gg = ent.balloons > 0 ? gravity : gravity*2.6;
      ent.vy += gg + wind*0.01;
      ent.x += ent.vx;
      ent.y += ent.vy;

      // world bounds
      if (ent.x < 8) { ent.x = 8; ent.vx = Math.abs(ent.vx); }
      if (ent.x > W-8) { ent.x = W-8; ent.vx = -Math.abs(ent.vx); }
      if (ent.y < 8) { ent.y = 8; ent.vy = 0; }
      if (ent.y > H + 60) {
        // fallen out of screen
        if (ent.balloons > 0) ent.balloons = 0; // ensure popped
        ent.vx = 0; ent.vy = 0;
      }

      // Landing on platforms (only when moving downward)
      ent.onPlatform = false;
      for (let p of platforms) {
        const topY = p.y;
        if (ent.prevY + ent.radius <= topY && ent.y + ent.radius >= topY) {
          // horizontally within platform range (slight tolerance)
          if (ent.x > p.x - 8 && ent.x < p.x + p.w + 8) {
            // land
            ent.y = topY - ent.radius;
            ent.vy = -1.2; // small bounce
            ent.onPlatform = true;
            // small bounce reduces when balloon popped
            if (ent.balloons <= 0) {
              ent.vy = 2; // sink off platform
              ent.onPlatform = false;
            }
          }
        }
      }

      // Hazards on sides: lightning can pop balloons if near edges when active
      if (ent.x < 18 && hazards.left && ent.balloons>0 && ent.invuln<=0) {
        ent.balloons--;
        ent.invuln = 60;
        sfxPop();
      }
      if (ent.x > W-18 && hazards.right && ent.balloons>0 && ent.invuln<=0) {
        ent.balloons--;
        ent.invuln = 60;
        sfxPop();
      }

      // Cap speeds
      ent.vy = Math.max(ent.vy, -6.5);
      ent.vy = Math.min(ent.vy, 12);
      ent.vx = Math.max(Math.min(ent.vx, 4), -4);
    }

    // Collisions between entities: bump into opponent/enemy to pop one balloon
    // We'll detect overlapping and determine who initiated the overlap by previous positions.
    for (let i=0;i<entities.length;i++){
      for (let j=i+1;j<entities.length;j++){
        const a = entities[i], b = entities[j];
        if (!a || !b) continue;
        const dx = a.x - b.x, dy = a.y - b.y;
        const dist = Math.hypot(dx,dy);
        if (dist < a.radius + b.radius - 1) {
          // overlapping -> determine who moved into whom by checking previous positions
          const prevDx = (a.prevX - b.prevX), prevDy = (a.prevY - b.prevY);
          const prevDist = Math.hypot(prevDx, prevDy);
          // If a approached b (prevDist > dist), then a "hit" b.
          if (prevDist > dist + 0.2) {
            // a hit b
            if (b.balloons>0 && b.invuln<=0) {
              b.balloons--;
              b.invuln = 40;
              // knockback
              const nx = dx / (dist+0.01);
              b.vx += nx * 1.6;
              b.vy -= 2.0;
              sfxPop();
              // scoring if player hits enemy or other player
              if (a.type === 'player') {
                if (a.id === 1) score.p1++;
                else if (a.id === 2) score.p2++;
                a.score++;
              }
            }
          } else if (prevDist < dist - 0.2) {
            // b moved into a
            if (a.balloons>0 && a.invuln<=0) {
              a.balloons--;
              a.invuln = 40;
              const nx = -dx / (dist+0.01);
              a.vx += nx * 1.6;
              a.vy -= 2.0;
              sfxPop();
              if (b.type === 'player') {
                if (b.id === 1) score.p1++;
                else if (b.id === 2) score.p2++;
                b.score++;
              }
            }
          } else {
            // ambiguous: both bounce apart a bit
            const nx = dx / (dist+0.01);
            a.vx += nx * 0.6; b.vx -= nx * 0.6;
            a.vy -= 0.8; b.vy -= 0.8;
          }
        }
      }
    }

    // check win condition: last entity with any balloons > 0
    const alive = entities.filter(e => e.balloons > 0);
    // If there is only one entity with any balloons -> winner.
    if (alive.length <= 1) {
      if (alive.length === 1) {
        const winner = alive[0];
        state = 'win';
        stopBGM();
        sfxWin();
        lastWinner = winner;
      } else {
        state = 'gameover';
        stopBGM();
        sfxFall();
      }
    }

    // simple scoring update on overlay
    overlayScores.innerHTML = `P1: ${players[0].balloons} 🎈 | P2: ${players[1].balloons} 🎈<br>Score P1:${score.p1} P2:${score.p2}`;
  }

  // Drawing helpers: pixel art faces
  function drawPixelArtSprite(ctx, ent) {
    // We'll draw a side-view sprite ~ 16x20 pixels scaled by PS
    // Side view facing right if ent.facing > 0 else left
    const x = Math.round(ent.x);
    const y = Math.round(ent.y);
    const scale = 1.6; // visual scale
    // We'll draw at offset so sprite sits on center bottom.
    const w = 18, h = 22;
    const sx = Math.round(x - 8);
    const sy = Math.round(y - 12);

    // Body shadow/outline
    ctx.save();
    ctx.translate(0,0);
    // Draw body (simple rectangle with cardigan or apron)
    if (ent.portrait === 'takeshi') {
      // cream shirt with red apron strap
      // torso
      ctx.fillStyle = '#fff3d6';
      ctx.fillRect(sx+2, sy+10, 12, 8);
      // apron strap
      ctx.fillStyle = '#d52a2a';
      ctx.fillRect(sx+7, sy+10, 2, 8);
      // neck
      ctx.fillStyle = '#d9c6b0';
      ctx.fillRect(sx+6, sy+8, 4, 2);
    } else {
      // Kenji: beige cardigan over black t-shirt
      ctx.fillStyle = '#e6d5bd';
      ctx.fillRect(sx+2, sy+10, 12, 8);
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(sx+5, sy+12, 8, 5);
    }

    // Face (oval)
    ctx.fillStyle = '#f3d7c7';
    ctx.fillRect(sx+4, sy+2, 8, 6);
    // hair and facial features differ
    if (ent.portrait === 'takeshi') {
      // messy salt-and-pepper hair sticking up
      // use black/gray blocks
      ctx.fillStyle = '#232527';
      ctx.fillRect(sx+3, sy+1, 2, 2);
      ctx.fillRect(sx+5, sy+0, 4, 2);
      ctx.fillRect(sx+9, sy+1, 2, 2);
      ctx.fillStyle = '#9aa0a6';
      ctx.fillRect(sx+5, sy+2, 2, 1);
      // big black square glasses
      ctx.fillStyle = '#000';
      ctx.fillRect(sx+5, sy+3, 3, 2);
      ctx.fillRect(sx+8, sy+3, 2, 2);
      // bridge
      ctx.fillStyle = '#000';
      ctx.fillRect(sx+8, sy+4, 1, 1);
      // eyes inside glasses - lighter
      ctx.fillStyle = '#fff';
      ctx.fillRect(sx+6, sy+4, 1, 1);
      ctx.fillRect(sx+9, sy+4, 1, 1);
      // stubble: dots on chin
      ctx.fillStyle = '#444';
      ctx.fillRect(sx+5, sy+7, 1, 1);
      ctx.fillRect(sx+7, sy+7, 1, 1);
      ctx.fillRect(sx+9, sy+7, 1, 1);
    } else {
      // Kenji
      // dark brown bowl-cut hair
      ctx.fillStyle = '#3a2b18';
      ctx.fillRect(sx+3, sy+0, 10, 3);
      ctx.fillRect(sx+4, sy+3, 8, 1);
      // mole on left cheek (viewer right)
      ctx.fillStyle = '#221717';
      ctx.fillRect(sx+10, sy+5, 1, 1);
      // eyes
      ctx.fillStyle = '#000';
      ctx.fillRect(sx+6, sy+4, 1, 1);
      ctx.fillRect(sx+8, sy+4, 1, 1);
    }

    // Arms (side view)
    ctx.fillStyle = '#f3d7c7';
    ctx.fillRect(sx+1, sy+12, 3, 3);
    ctx.fillRect(sx+14, sy+12, 3, 3);

    // Legs
    ctx.fillStyle = '#2b2b2b';
    ctx.fillRect(sx+4, sy+18, 3, 3);
    ctx.fillRect(sx+10, sy+18, 3, 3);

    // Balloons behind the back: two balloons tied to back
    // let's draw them offset up-left for left-facing and up-right for right-facing
    const facing = ent.facing >= 0 ? 1 : -1;
    // determine colors
    let b1='#f00', b2='#00f';
    if (ent.portrait === 'takeshi') { b1='#d90000'; b2='#0b66ff'; }
    else { b1='#74c942'; b2='#f3e85a'; } // Kenji green/yellow
    if (ent.type === 'enemy') { b1='#ff55aa'; b2='#88ddff'; }

    // If balloon popped, don't draw
    if (ent.balloons >= 2) {
      // two balloons
      ctx.beginPath();
      ctx.fillStyle = b1;
      ctx.ellipse(sx + 12 + facing*6, sy + 2, 4,5,0,0,Math.PI*2);
      ctx.fill();
      // string
      ctx.strokeStyle = '#222'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(sx+8, sy+8); ctx.lineTo(sx+11 + facing*6, sy+6); ctx.stroke();
      // second
      ctx.beginPath();
      ctx.fillStyle = b2;
      ctx.ellipse(sx + 8 + facing*2, sy + 0, 4,5,0,0,Math.PI*2);
      ctx.fill();
      ctx.beginPath(); ctx.moveTo(sx+8, sy+8); ctx.lineTo(sx+8 + facing*2, sy+2); ctx.stroke();
    } else if (ent.balloons === 1) {
      // one balloon remaining (draw only one)
      ctx.beginPath();
      ctx.fillStyle = b1;
      ctx.ellipse(sx + 10 + facing*4, sy + 1, 4,5,0,0,Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = '#222'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(sx+8, sy+8); ctx.lineTo(sx+10 + facing*4, sy+3); ctx.stroke();
    } else {
      // no balloons: show wounds (small X)
      ctx.fillStyle = '#ff8080';
      ctx.fillRect(sx+6, sy+8, 2,1);
      ctx.fillStyle = '#000';
      ctx.fillRect(sx+6, sy+9, 4,1);
    }

    // simple outline
    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
    ctx.strokeRect(sx+2, sy+2, 12, 12);

    ctx.restore();
  }

  // draw clouds/platform
  function drawPlatform(p) {
    // cloud with soft edges: draw white ellipse rectangles
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    // base
    roundRect(ctx, p.x, p.y, p.w, p.h, 6, true, false);
    // puffs
    ctx.beginPath();
    ctx.ellipse(p.x+8, p.y+4, 10,6, 0,0,Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(p.x + p.w - 10, p.y+4, 10,6,0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  function roundRect(ctx, x, y, w, h, r, fill, stroke) {
    if (r===undefined) r=5;
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
    if (fill) ctx.fill();
    if (stroke) ctx.stroke();
  }

  let lastWinner = null;
  // Render loop
  function render(t) {
    if (!lastTimestamp) lastTimestamp = t;
    const dt = t - lastTimestamp;
    lastTimestamp = t;

    update(dt);

    // clear
    ctx.clearRect(0,0,W,H);
    // background gradient sky and distant clouds
    // ground sliver
    ctx.fillStyle = '#bfefff';
    ctx.fillRect(0, H-10, W, 10);

    // draw platforms
    for (let p of platforms) drawPlatform(p);

    // draw hazards: flashing lightning on sides
    if (hazards.left) drawLightning(8, 30, true);
    if (hazards.right) drawLightning(W-8, 30, false);

    // draw entities sorted by y (so those lower appear in front)
    const sorted = [...entities].sort((a,b)=>a.y - b.y);
    for (let ent of sorted) {
      // shadow
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.beginPath();
      ctx.ellipse(ent.x, ent.y + ent.radius + 6, ent.radius+4, 3, 0, 0, Math.PI*2);
      ctx.fill();

      // draw character pixel sprite
      drawPixelArtSprite(ctx, ent);

      // balloon count indicator above head
      ctx.fillStyle = '#222';
      ctx.font = '8px monospace';
      ctx.fillText(`${ent.name} ${ent.balloons}🎈`, ent.x - 20, ent.y - 18);

      // invulnerability flash overlay
      if (ent.invuln > 0 && Math.floor(ent.invuln/4) % 2 === 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        ctx.beginPath();
        ctx.arc(ent.x, ent.y-2, ent.radius+4,0,Math.PI*2);
        ctx.fill();
      }
    }

    // UI: title and subtitle if state=title
    if (state === 'title') {
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(16,30, W-32, 160);
      ctx.fillStyle = '#fff';
      ctx.font = '12px sans-serif';
      ctx.fillText('スーパーTANABEブラザーズ', 40, 64);
      ctx.font = '11px sans-serif';
      ctx.fillText('〜バルーンファイト〜', 52, 82);
      ctx.font = '9px monospace';
      ctx.fillText('1P: WASD (W=flap). 2P: Arrows (↑=flap). Touch: left=P1 right=P2', 28, 110);
      ctx.fillText('Goal: Pop balloons. Last one with a balloon wins!', 28, 126);
      ctx.fillText('Click / Press ENTER to START', 52, 152);
      // draw small sprites for both heroes
      drawPixelArtSprite(ctx, {x:80,y:150,portrait:'takeshi',balloons:2,facing:1,name:'TAKESHI'});
      drawPixelArtSprite(ctx, {x:176,y:150,portrait:'kenji',balloons:2,facing:-1,name:'KENJI'});
    }

    if (state === 'win') {
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(16,30, W-32, 160);
      ctx.fillStyle = '#fff';
      ctx.font = '14px sans-serif';
      let label = lastWinner ? (lastWinner.type==='player' ? `${lastWinner.name} WINS!` : `ENEMY WINS!`) : 'YOU WIN!';
      ctx.fillText(label, 60, 80);
      ctx.font = '10px sans-serif';
      ctx.fillText('Press ENTER or Click to go to title', 48, 120);
      ctx.fillText(`Score P1:${score.p1}  P2:${score.p2}`, 80, 140);
    }

    if (state === 'gameover') {
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(16,30, W-32, 160);
      ctx.fillStyle = '#fff';
      ctx.font = '14px sans-serif';
      ctx.fillText('GAME OVER', 80, 80);
      ctx.font = '10px sans-serif';
      ctx.fillText('No balloons left. Press ENTER or Click to return to title', 22, 120);
    }

    requestAnimationFrame(render);
  }

  // draw lightning bolt
  function drawLightning(x,y, left) {
    ctx.save();
    ctx.translate(0,0);
    ctx.strokeStyle = 'rgba(255,255,120,0.95)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    if (left) {
      ctx.moveTo(16,8); ctx.lineTo(6,30); ctx.lineTo(18,32); ctx.lineTo(8,56);
    } else {
      ctx.moveTo(W-16,8); ctx.lineTo(W-6,30); ctx.lineTo(W-18,32); ctx.lineTo(W-8,56);
    }
    ctx.stroke();
    ctx.restore();
  }

  // Start title screen first
  state = 'title';
  touchHint.textContent = 'Touch to flap: Left=P1 Right=P2';

  // Kick off the loop
  requestAnimationFrame(render);

  // Expose some debug controls on console (optional)
  window._game = {
    startBGM, stopBGM, resetGame, entities, platforms
  };

})();
</script>
</body>
</html>
